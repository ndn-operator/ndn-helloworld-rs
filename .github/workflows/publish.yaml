name: Build application image
on:
  push:
    branches:
    - main
  pull_request:
  workflow_dispatch:
    inputs:
      release_tag:
        description: Image tag to publish after the ndnd interoperability gate passed
        required: true
        default: v0.1.0
        type: string
      ndnd_interop_passed:
        description: Confirm tests/ndnd-interop.sh passed with ndnd 1.5.2
        required: true
        default: false
        type: boolean
jobs:
  test:
    runs-on: ubuntu-24.04
    steps:
    - uses: actions/checkout@v4
    - uses: dtolnay/rust-toolchain@stable
    - run: cargo test --locked
  image:
    if: github.event_name == 'workflow_dispatch' && inputs.ndnd_interop_passed == true
    needs: test
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      packages: write
    steps:
    - uses: actions/checkout@v4
    - uses: docker/setup-qemu-action@v3
    - uses: docker/setup-buildx-action@v3
    - uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    - uses: docker/build-push-action@v6
      with:
        context: .
        push: true
        platforms: linux/amd64,linux/arm64
        tags: ghcr.io/ndn-operator/ndn-helloworld-rs:${{ inputs.release_tag }}
